<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3148;
      --text: #e2e8f0;
      --text-dim: #6b7280;
      --accent: #6366f1;
      --accent-hover: #4f52d6;
      --light-sq: #f0d9b5;
      --dark-sq: #b58863;
      --selected: #7fc97f;
      --valid-dot: rgba(0,0,0,0.25);
      --last-move: rgba(255, 255, 100, 0.35);
      --check: rgba(220, 50, 50, 0.55);
      --hint-sq: rgba(245, 158, 11, 0.55);
      --sq-size: 64px;
      --rank-w: 20px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: background-color 0.7s ease;
    }

    /* Background tint by turn */
    body.bg-white-turn { background-color: #d8d2c5; }
    body.bg-black-turn { background-color: #06080e; }
    body.bg-white-turn h1 { color: #1c1810; }
    body.bg-white-turn h1 span { color: var(--accent); }
    body.bg-white-turn .board-labels-file span,
    body.bg-white-turn .rank-labels span { color: #4a3828; }
    body.bg-white-turn .status-bar {
      background: rgba(240,234,222,0.92);
      border-color: #b8b0a0;
      color: #1c1810;
    }
    body.bg-white-turn .status-bar.check { color: #dc2626; border-color: #dc2626; }
    body.bg-white-turn .status-bar.game-over { color: var(--accent); border-color: var(--accent); }
    body.bg-white-turn .hint-panel { background: rgba(250,245,235,0.95); border-color: #d97706; color: #1c1810; }
    body.bg-white-turn .hint-explain { color: #1c1810; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
      transition: color 0.5s;
    }
    h1 span { color: var(--accent); }

    .game-wrap {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Player panels */
    .player-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      width: 190px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .player-panel.active-turn {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .player-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .player-name-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
    }
    .player-name-input:focus { outline: none; border-color: var(--accent); }

    .timer {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      letter-spacing: 0.04em;
    }
    .timer.white-timer { background: var(--light-sq); color: #3d2b1f; }
    .timer.black-timer { background: var(--dark-sq); color: #fff; }
    .timer.ticking { box-shadow: 0 0 0 2px var(--accent); }
    .timer.low { color: #ef4444 !important; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Per-player timer config */
    .player-timer-config {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .player-timer-config select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 4px 5px;
      font-size: 11px;
      flex: 1;
      min-width: 0;
    }
    .player-timer-config select:focus { outline: none; border-color: var(--accent); }

    .captured-pieces {
      min-height: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      font-size: 22px;
      line-height: 1.2;
    }
    .captured-pieces .cap-w {
      color: #fffff0;
      text-shadow: -1.5px -1.5px 0 #2d1b0e, 1.5px -1.5px 0 #2d1b0e,
                   -1.5px  1.5px 0 #2d1b0e, 1.5px  1.5px 0 #2d1b0e;
    }
    .captured-pieces .cap-b { color: #0a0a0a; }

    /* Hint badge */
    .hint-badge-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .hint-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1px 9px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    .hint-count.out { color: #ef4444; border-color: #ef4444; }

    /* Board */
    .board-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
    .board-with-ranks { display: flex; align-items: stretch; }
    .rank-labels {
      display: flex;
      flex-direction: column;
      margin-right: 4px;
      flex-shrink: 0;
    }
    .rank-labels span {
      width: var(--rank-w);
      height: var(--sq-size);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-dim);
      transition: color 0.5s;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, var(--sq-size));
      grid-template-rows: repeat(8, var(--sq-size));
      width: calc(var(--sq-size) * 8);
      height: calc(var(--sq-size) * 8);
      border: 3px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      user-select: none;
    }

    .file-row { display: flex; align-items: center; }
    .rank-spacer { width: calc(var(--rank-w) + 4px); flex-shrink: 0; }
    .board-labels-file {
      display: flex;
      width: calc(var(--sq-size) * 8);
      padding: 0 2px;
    }
    .board-labels-file span {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      transition: color 0.5s;
    }

    .sq {
      width: var(--sq-size);
      height: var(--sq-size);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: filter 0.1s;
    }
    .sq:hover { filter: brightness(1.1); }
    .sq.light { background: var(--light-sq); }
    .sq.dark  { background: var(--dark-sq); }
    .sq.selected    { background: var(--selected) !important; }
    .sq.last-move   { background-color: var(--last-move) !important; background-blend-mode: multiply; }
    .sq.in-check    { background: var(--check) !important; }
    .sq.hint-sq     { background: var(--hint-sq) !important; }

    .sq.valid-move::after {
      content: '';
      position: absolute;
      width: 28%; height: 28%;
      border-radius: 50%;
      background: var(--valid-dot);
      pointer-events: none;
    }
    .sq.valid-capture::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 6px solid var(--valid-dot);
      pointer-events: none;
    }

    .piece {
      font-size: calc(var(--sq-size) * 0.82);
      line-height: 1;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: transform 0.08s;
    }
    .piece:hover { transform: scale(1.1); }
    .piece-white {
      color: #fffff0;
      text-shadow:
        -2px -2px 0 #2d1b0e,  2px -2px 0 #2d1b0e,
        -2px  2px 0 #2d1b0e,  2px  2px 0 #2d1b0e,
         0    0   6px rgba(0,0,0,0.5);
    }
    .piece-black { color: #0a0a0a; text-shadow: none; }

    .sq-coord {
      position: absolute;
      bottom: 2px;
      left: 3px;
      font-size: calc(var(--sq-size) * 0.16);
      line-height: 1;
      pointer-events: none;
      z-index: 0;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .sq.light .sq-coord { color: rgba(70, 40, 15, 0.38); }
    .sq.dark  .sq-coord { color: rgba(255, 235, 195, 0.45); }
    .sq.selected .sq-coord, .sq.hint-sq .sq-coord { opacity: 0.6; }

    /* Status bar */
    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      min-width: calc(var(--sq-size) * 8 + var(--rank-w) + 4px);
      transition: background 0.5s, border-color 0.5s, color 0.5s;
    }
    .status-bar.check { border-color: #ef4444; color: #ef4444; }
    .status-bar.game-over { border-color: var(--accent); color: var(--accent); font-size: 16px; }

    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--surface2); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-hint { background: #f59e0b; color: #1a0f00; font-weight: 700; }
    .btn-hint:hover:not(:disabled) { background: #d97706; }
    .btn-hint:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-surrender { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
    .btn-surrender:hover:not(:disabled) { background: rgba(239,68,68,0.12); }
    .btn-surrender:disabled { opacity: 0.35; cursor: not-allowed; }

    .game-config {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
      flex-wrap: wrap;
    }
    .game-config select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 5px 8px;
      font-size: 13px;
    }
    .cfg-sep { color: var(--border); font-size: 14px; }

    /* Hint panel */
    .hint-panel {
      background: var(--surface);
      border: 1px solid #f59e0b;
      border-radius: 10px;
      padding: 14px 18px;
      max-width: calc(var(--sq-size) * 8 + var(--rank-w) + 4px);
      width: 100%;
      transition: background 0.5s;
    }
    .hint-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #f59e0b;
      margin-bottom: 6px;
    }
    .hint-move-row {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .hint-move-row strong { color: #f59e0b; font-size: 17px; margin-left: 4px; }
    .hint-explain { font-size: 14px; line-height: 1.65; color: var(--text); transition: color 0.5s; }

    /* Multiplayer panel */
    .mp-panel {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      width: 100%;
    }
    .mp-row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
    .mp-sep { color: var(--border); padding-bottom: 6px; font-size: 18px; }
    .mp-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 5px; }
    .mp-join-row { display: flex; gap: 6px; align-items: flex-end; }
    .mp-input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 6px 10px; font-size: 16px; font-weight: 700;
      letter-spacing: 0.12em; width: 76px; text-transform: uppercase;
    }
    .mp-input:focus { outline: none; border-color: var(--accent); }
    .mp-code-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--text-dim); }
    .mp-code { font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: 0.18em; }
    .mp-status { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 18px; }

    @media (max-width: 1100px) {
      .board-wrap { order: -1; }
    }

    @media (max-width: 600px) {
      .player-panel { width: 140px; }
      .timer { font-size: 22px; }
    }
  </style>
</head>
<body>

<h1>♟ <span>Chess</span></h1>

<div class="game-wrap">

  <!-- Black player -->
  <div class="player-panel" id="panel-black">
    <div class="player-label">Black ■</div>
    <input class="player-name-input" id="name-black" value="Daughter" />
    <div class="timer black-timer" id="timer-black">10:00</div>
    <div class="player-timer-config">
      ⏱
      <select id="total-b" onchange="onTimeChange()">
        <option value="60">1m</option>
        <option value="120">2m</option>
        <option value="180">3m</option>
        <option value="300">5m</option>
        <option value="600" selected>10m</option>
        <option value="900">15m</option>
        <option value="1800">30m</option>
        <option value="0">∞</option>
      </select>
      +
      <select id="inc-b" onchange="onTimeChange()">
        <option value="0" selected>0s</option>
        <option value="1">+1s</option>
        <option value="2">+2s</option>
        <option value="3">+3s</option>
        <option value="5">+5s</option>
        <option value="10">+10s</option>
        <option value="15">+15s</option>
        <option value="20">+20s</option>
        <option value="30">+30s</option>
      </select>
    </div>
    <div class="captured-pieces" id="cap-black"></div>
    <div class="hint-badge-row">💡 <span class="hint-count" id="hint-badge-black">3</span> hints left</div>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="board-with-ranks">
      <div class="rank-labels" id="rank-labels"></div>
      <div id="board"></div>
    </div>
    <div class="file-row">
      <div class="rank-spacer"></div>
      <div class="board-labels-file" id="file-labels"></div>
    </div>
    <div class="status-bar" id="status">White's turn</div>
    <div class="controls">
      <button class="btn-primary" onclick="newGame()">New Game</button>
      <button class="btn-outline" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
      <button class="btn-outline" id="btn-undo" onclick="undoMove()">↩ Undo</button>
      <button class="btn-hint" id="btn-hint" onclick="requestHint()">💡 Hint</button>
      <button class="btn-surrender" id="btn-surrender" onclick="surrender()">🏳 Surrender</button>
      <button class="btn-outline" id="btn-mp" onclick="toggleMpPanel()">🌐 Multi</button>
      <div class="game-config">
        Preset:
        <select id="preset-select" onchange="applyPreset()">
          <option value="">Custom</option>
          <optgroup label="Bullet">
            <option value="60:0">1+0</option>
            <option value="60:1">1+1</option>
            <option value="120:1">2+1</option>
          </optgroup>
          <optgroup label="Blitz">
            <option value="180:0">3+0</option>
            <option value="180:2">3+2</option>
            <option value="300:0">5+0</option>
            <option value="300:3">5+3</option>
          </optgroup>
          <optgroup label="Rapid">
            <option value="600:0">10+0</option>
            <option value="600:5">10+5</option>
            <option value="600:10">10+10</option>
            <option value="900:10">15+10</option>
          </optgroup>
          <optgroup label="Classical">
            <option value="1800:0">30+0</option>
            <option value="1800:20">30+20</option>
          </optgroup>
          <option value="0:0">No limit</option>
        </select>
        <span class="cfg-sep">|</span>
        💡
        <select id="hint-limit-select" onchange="onHintLimitChange()" title="Hints per player">
          <option value="1">1 ea</option>
          <option value="3" selected>3 ea</option>
          <option value="5">5 ea</option>
          <option value="10">10 ea</option>
          <option value="0">∞</option>
        </select>
      </div>
    </div>
    <div id="mp-panel" class="mp-panel" style="display:none">
      <div class="mp-row">
        <div>
          <div class="mp-label">Host a game</div>
          <button class="btn-primary" onclick="mpCreate()">Create</button>
        </div>
        <div class="mp-sep">|</div>
        <div class="mp-join-row">
          <div>
            <div class="mp-label">Join a game</div>
            <input id="mp-join-input" class="mp-input" placeholder="CODE" maxlength="6"
              oninput="this.value=this.value.toUpperCase()"
              onkeydown="if(event.key==='Enter')mpJoin()" />
          </div>
          <button class="btn-outline" onclick="mpJoin()">Join</button>
        </div>
      </div>
      <div id="mp-code-row" class="mp-code-row" style="display:none">
        Share this code: <strong id="mp-code-display" class="mp-code">—</strong>
      </div>
      <div id="mp-status" class="mp-status"></div>
    </div>

    <div id="hint-panel" class="hint-panel" style="display:none">
      <div class="hint-header">💡 Hint for <span id="hint-for-name">—</span></div>
      <div class="hint-move-row">Best move: <strong id="hint-move-text">—</strong></div>
      <div class="hint-explain" id="hint-explain"></div>
    </div>
  </div>

  <!-- White player -->
  <div class="player-panel" id="panel-white">
    <div class="player-label">White □</div>
    <input class="player-name-input" id="name-white" value="Dad" />
    <div class="timer white-timer" id="timer-white">10:00</div>
    <div class="player-timer-config">
      ⏱
      <select id="total-w" onchange="onTimeChange()">
        <option value="60">1m</option>
        <option value="120">2m</option>
        <option value="180">3m</option>
        <option value="300">5m</option>
        <option value="600" selected>10m</option>
        <option value="900">15m</option>
        <option value="1800">30m</option>
        <option value="0">∞</option>
      </select>
      +
      <select id="inc-w" onchange="onTimeChange()">
        <option value="0" selected>0s</option>
        <option value="1">+1s</option>
        <option value="2">+2s</option>
        <option value="3">+3s</option>
        <option value="5">+5s</option>
        <option value="10">+10s</option>
        <option value="15">+15s</option>
        <option value="20">+20s</option>
        <option value="30">+30s</option>
      </select>
    </div>
    <div class="captured-pieces" id="cap-white"></div>
    <div class="hint-badge-row">💡 <span class="hint-count" id="hint-badge-white">3</span> hints left</div>
  </div>

</div>

<script>
  const PIECES = {
    wK: '♔', wQ: '♕', wR: '♖', wB: '♗', wN: '♘', wP: '♙',
    bK: '♚', bQ: '♛', bR: '♜', bB: '♝', bN: '♞', bP: '♟',
  };
  const FILES = ['a','b','c','d','e','f','g','h'];
  const PIECE_ORDER = { p: 0, n: 1, b: 2, r: 3, q: 4 };

  let game = new Chess();
  let selected = null;
  let validMoves = [];
  let lastMove = null;
  let gameOver = false;
  let hintHighlight = null;

  // Multiplayer
  let mpMode = false, mpColor = null, mpSocket = null, mpRoomId = null;

  // Per-player Fischer clock
  let totalSecsW = 600, totalSecsB = 600;
  let incSecsW = 0,     incSecsB = 0;
  let timeWhite, timeBlack;
  let timerInterval = null;
  let timerEnabled = true;
  let timerRunning = false;

  // Hints
  let hintLimit = 3;
  let hintsUsedWhite = 0;
  let hintsUsedBlack = 0;

  // ---- Init ----
  function newGame() {
    if (mpMode) {
      mpMode = false;
      try { if (mpSocket) mpSocket.close(); } catch(e) {}
      mpSocket = null;
      setMpStatus('');
      document.getElementById('mp-panel').style.display = 'none';
    }
    game = new Chess();
    selected = null;
    validMoves = [];
    lastMove = null;
    gameOver = false;
    hintHighlight = null;

    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;

    totalSecsW = parseInt(document.getElementById('total-w').value);
    totalSecsB = parseInt(document.getElementById('total-b').value);
    incSecsW   = parseInt(document.getElementById('inc-w').value);
    incSecsB   = parseInt(document.getElementById('inc-b').value);
    timerEnabled = totalSecsW > 0 || totalSecsB > 0;
    timeWhite = totalSecsW;
    timeBlack = totalSecsB;

    hintLimit = parseInt(document.getElementById('hint-limit-select').value);
    hintsUsedWhite = 0;
    hintsUsedBlack = 0;

    document.getElementById('btn-undo').disabled = false;
    document.getElementById('btn-surrender').disabled = false;
    document.getElementById('btn-pause').textContent = '⏸ Pause';
    document.getElementById('hint-panel').style.display = 'none';

    renderBoard();
    updateCaptures();
    renderTimers();
    updateStatus();
    updateHintBadges();
    updateBackground();
  }

  function applyPreset() {
    const val = document.getElementById('preset-select').value;
    if (!val) return;
    const [total, inc] = val.split(':');
    // Apply same settings to both players
    document.getElementById('total-w').value = total;
    document.getElementById('total-b').value = total;
    document.getElementById('inc-w').value   = inc;
    document.getElementById('inc-b').value   = inc;
    onTimeChange(true);
  }

  function onTimeChange(fromPreset = false) {
    if (!fromPreset) document.getElementById('preset-select').value = '';
    const s = document.getElementById('status');
    s.textContent = 'Timer change applies on New Game';
    setTimeout(() => { if (!gameOver) updateStatus(); }, 1500);
  }

  function onHintLimitChange() {
    const s = document.getElementById('status');
    s.textContent = 'Hint limit applies on New Game';
    setTimeout(() => { if (!gameOver) updateStatus(); }, 1500);
  }

  function togglePause() {
    if (gameOver || !timerEnabled) return;
    if (timerRunning) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerRunning = false;
      document.getElementById('btn-pause').textContent = '▶ Resume';
      setStatus('Game paused', '');
    } else {
      startTimer();
      updateStatus();
    }
  }

  // ---- Timer ----
  function startTimer() {
    if (!timerEnabled) return;
    clearInterval(timerInterval);
    timerInterval = setInterval(tickTimer, 1000);
    timerRunning = true;
    document.getElementById('btn-pause').textContent = '⏸ Pause';
  }

  function tickTimer() {
    if (gameOver) { clearInterval(timerInterval); timerRunning = false; return; }
    const turn = game.turn();
    if (turn === 'w' && totalSecsW > 0) {
      timeWhite--;
      if (timeWhite <= 0) { timeWhite = 0; renderTimers(); onTimeout('w'); return; }
    } else if (turn === 'b' && totalSecsB > 0) {
      timeBlack--;
      if (timeBlack <= 0) { timeBlack = 0; renderTimers(); onTimeout('b'); return; }
    }
    renderTimers();
  }

  function onTimeout(color) {
    clearInterval(timerInterval);
    timerRunning = false;
    gameOver = true;
    const winner = color === 'w'
      ? document.getElementById('name-black').value
      : document.getElementById('name-white').value;
    playGameOverSound();
    setStatus(`⏰ Time's up! ${winner} wins on time!`, 'game-over');
    updateBackground();
  }

  function renderTimers() {
    const wEl = document.getElementById('timer-white');
    const bEl = document.getElementById('timer-black');
    const isWhiteTurn = game.turn() === 'w';

    wEl.textContent = totalSecsW > 0 ? formatTime(timeWhite) : '—';
    bEl.textContent = totalSecsB > 0 ? formatTime(timeBlack) : '—';

    wEl.classList.toggle('ticking', isWhiteTurn  && totalSecsW > 0 && timerRunning && !gameOver);
    bEl.classList.toggle('ticking', !isWhiteTurn && totalSecsB > 0 && timerRunning && !gameOver);
    wEl.classList.toggle('low', totalSecsW > 0 && timeWhite > 0 && timeWhite <= 30);
    bEl.classList.toggle('low', totalSecsB > 0 && timeBlack > 0 && timeBlack <= 30);

    document.getElementById('panel-white').classList.toggle('active-turn', isWhiteTurn && !gameOver);
    document.getElementById('panel-black').classList.toggle('active-turn', !isWhiteTurn && !gameOver);

    updateBackground();
  }

  function formatTime(secs) {
    const m = Math.floor(secs / 60).toString().padStart(2, '0');
    const s = (secs % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  // ---- Background by turn ----
  function updateBackground() {
    const wt = !gameOver && game.turn() === 'w';
    const bt = !gameOver && game.turn() === 'b';
    document.body.classList.toggle('bg-white-turn', wt);
    document.body.classList.toggle('bg-black-turn', bt);
  }

  // ---- Captured pieces ----
  function updateCaptures() {
    const wCap = [], bCap = [];
    for (const move of game.history({ verbose: true })) {
      if (move.captured) {
        if (move.color === 'w') wCap.push(move.captured);
        else bCap.push(move.captured);
      }
    }
    wCap.sort((a, b) => PIECE_ORDER[a] - PIECE_ORDER[b]);
    bCap.sort((a, b) => PIECE_ORDER[a] - PIECE_ORDER[b]);
    document.getElementById('cap-white').innerHTML =
      wCap.map(p => `<span class="cap-b">${PIECES['b' + p.toUpperCase()]}</span>`).join('');
    document.getElementById('cap-black').innerHTML =
      bCap.map(p => `<span class="cap-w">${PIECES['w' + p.toUpperCase()]}</span>`).join('');
  }

  // ---- Board rendering ----
  function renderBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';

    const rankLabelsEl = document.getElementById('rank-labels');
    rankLabelsEl.innerHTML = '';
    for (let rank = 8; rank >= 1; rank--) {
      const span = document.createElement('span');
      span.textContent = rank;
      rankLabelsEl.appendChild(span);
    }

    for (let rank = 8; rank >= 1; rank--) {
      for (let fileIdx = 0; fileIdx < 8; fileIdx++) {
        const file = FILES[fileIdx];
        const sqName = file + rank;
        const isLight = (fileIdx + rank) % 2 !== 0;

        const sqEl = document.createElement('div');
        sqEl.className = 'sq ' + (isLight ? 'light' : 'dark');
        sqEl.dataset.sq = sqName;

        if (lastMove && (lastMove.from === sqName || lastMove.to === sqName))
          sqEl.classList.add('last-move');
        if (game.in_check()) {
          const kingPos = findKing(game.turn());
          if (sqName === kingPos) sqEl.classList.add('in-check');
        }
        if (selected === sqName) sqEl.classList.add('selected');
        if (hintHighlight && (sqName === hintHighlight.from || sqName === hintHighlight.to))
          sqEl.classList.add('hint-sq');

        if (selected) {
          const move = validMoves.find(m => m.to === sqName);
          if (move) {
            const piece = game.get(sqName);
            sqEl.classList.add(piece ? 'valid-capture' : 'valid-move');
          }
        }

        const piece = game.get(sqName);
        if (piece) {
          const key = (piece.color === 'w' ? 'w' : 'b') + piece.type.toUpperCase();
          const pieceEl = document.createElement('span');
          pieceEl.className = 'piece ' + (piece.color === 'w' ? 'piece-white' : 'piece-black');
          pieceEl.textContent = PIECES[key] || '?';
          sqEl.appendChild(pieceEl);
        }

        const coordEl = document.createElement('span');
        coordEl.className = 'sq-coord';
        coordEl.textContent = sqName;
        sqEl.appendChild(coordEl);

        sqEl.addEventListener('click', () => onSquareClick(sqName));
        boardEl.appendChild(sqEl);
      }
    }

    const labelsEl = document.getElementById('file-labels');
    labelsEl.innerHTML = FILES.map(f => `<span>${f}</span>`).join('');
  }

  function findKing(color) {
    for (let r = 1; r <= 8; r++) {
      for (let f of FILES) {
        const sq = f + r;
        const p = game.get(sq);
        if (p && p.type === 'k' && p.color === color) return sq;
      }
    }
    return null;
  }

  // ---- Click handler ----
  function onSquareClick(sqName) {
    if (gameOver) return;
    if (mpMode) {
      const myTurn = (mpColor === 'white' && game.turn() === 'w') ||
                     (mpColor === 'black' && game.turn() === 'b');
      if (!myTurn) return;
    }
    const piece = game.get(sqName);

    if (selected) {
      // Click the already-selected piece → deselect
      if (sqName === selected) {
        selected = null;
        validMoves = [];
        renderBoard();
        return;
      }

      const move = validMoves.find(m => m.to === sqName);
      if (move) {
        const result = game.move({ from: selected, to: sqName, promotion: 'q' });
        if (result) {
          playMoveSound(!!result.captured);
          lastMove = { from: selected, to: sqName };
          selected = null;
          validMoves = [];
          hintHighlight = null;
          document.getElementById('hint-panel').style.display = 'none';
          // Fischer increment for the player who just moved
          if (game.turn() === 'b' && totalSecsW > 0 && incSecsW > 0) timeWhite += incSecsW;
          else if (game.turn() === 'w' && totalSecsB > 0 && incSecsB > 0) timeBlack += incSecsB;
          if (!timerRunning && !gameOver) startTimer();
          renderBoard();
          updateCaptures();
          renderTimers();
          updateStatus();
          updateHintBadges();
          if (mpMode && mpSocket && mpSocket.readyState === WebSocket.OPEN) {
            mpSocket.send(JSON.stringify({
              type: 'move', fen: game.fen(),
              move: { from: result.from, to: result.to, promotion: result.promotion || 'q' },
              captured: !!result.captured, timeWhite, timeBlack
            }));
          }
          return;
        }
      }
      // Re-select own piece
      if (piece && piece.color === (game.turn() === 'w' ? 'w' : 'b')) {
        selected = sqName;
        validMoves = game.moves({ square: sqName, verbose: true });
        renderBoard();
        return;
      }
      // Deselect
      selected = null;
      validMoves = [];
      renderBoard();
      return;
    }

    if (piece && piece.color === (game.turn() === 'w' ? 'w' : 'b')) {
      selected = sqName;
      validMoves = game.moves({ square: sqName, verbose: true });
      renderBoard();
    }
  }

  // ---- Status ----
  function updateStatus() {
    if (game.in_checkmate()) {
      const winner = game.turn() === 'w'
        ? document.getElementById('name-black').value
        : document.getElementById('name-white').value;
      setStatus(`♛ Checkmate! ${winner} wins!`, 'game-over');
      gameOver = true;
      playGameOverSound();
      clearInterval(timerInterval);
      document.getElementById('btn-undo').disabled = true;
      document.getElementById('btn-surrender').disabled = true;
      updateBackground();
    } else if (game.in_stalemate()) {
      setStatus('½ Stalemate — Draw!', 'game-over');
      gameOver = true;
      playGameOverSound();
      clearInterval(timerInterval);
      document.getElementById('btn-surrender').disabled = true;
      updateBackground();
    } else if (game.in_draw()) {
      setStatus('½ Draw!', 'game-over');
      gameOver = true;
      playGameOverSound();
      clearInterval(timerInterval);
      document.getElementById('btn-surrender').disabled = true;
      updateBackground();
    } else if (game.in_check()) {
      const who = game.turn() === 'w'
        ? document.getElementById('name-white').value
        : document.getElementById('name-black').value;
      playCheckSound();
      setStatus(`⚠ Check! ${who}'s move`, 'check');
    } else {
      const who = game.turn() === 'w'
        ? document.getElementById('name-white').value
        : document.getElementById('name-black').value;
      setStatus(`${game.turn() === 'w' ? '□' : '■'} ${who}'s turn`);
    }
  }

  function setStatus(text, cls = '') {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status-bar' + (cls ? ' ' + cls : '');
  }

  // ---- Surrender ----
  function surrender() {
    if (gameOver) return;
    const loser  = game.turn() === 'w'
      ? document.getElementById('name-white').value
      : document.getElementById('name-black').value;
    const winner = game.turn() === 'w'
      ? document.getElementById('name-black').value
      : document.getElementById('name-white').value;
    gameOver = true;
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('btn-undo').disabled = true;
    document.getElementById('btn-surrender').disabled = true;
    playGameOverSound();
    setStatus(`🏳 ${loser} surrendered — ${winner} wins!`, 'game-over');
    updateBackground();
  }

  // ---- Undo ----
  function undoMove() {
    if (gameOver) return;
    const undone = game.undo();
    if (!undone) return;
    lastMove = null;
    selected = null;
    validMoves = [];
    hintHighlight = null;
    document.getElementById('hint-panel').style.display = 'none';
    renderBoard();
    updateCaptures();
    renderTimers();
    updateStatus();
    updateHintBadges();
  }

  // ---- Hints ----
  function updateHintBadges() {
    const unlimited = hintLimit === 0;
    const wLeft = unlimited ? '∞' : Math.max(0, hintLimit - hintsUsedWhite);
    const bLeft = unlimited ? '∞' : Math.max(0, hintLimit - hintsUsedBlack);
    const wOut  = !unlimited && hintsUsedWhite >= hintLimit;
    const bOut  = !unlimited && hintsUsedBlack >= hintLimit;

    const wBadge = document.getElementById('hint-badge-white');
    const bBadge = document.getElementById('hint-badge-black');
    wBadge.textContent = wLeft;
    wBadge.className = 'hint-count' + (wOut ? ' out' : '');
    bBadge.textContent = bLeft;
    bBadge.className = 'hint-count' + (bOut ? ' out' : '');

    const isWhite = game.turn() === 'w';
    const used = isWhite ? hintsUsedWhite : hintsUsedBlack;
    document.getElementById('btn-hint').disabled =
      gameOver || (!unlimited && used >= hintLimit);
  }

  // ---- Stockfish Hint (runs in browser via Web Worker — no API key needed) ----
  const SF_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js';
  let _sfWorker = null, _sfReady = false;

  async function getStockfish() {
    if (_sfWorker && _sfReady) return _sfWorker;
    if (_sfWorker) { _sfWorker.terminate(); _sfWorker = null; _sfReady = false; }
    const code = await fetch(SF_CDN).then(r => r.text());
    _sfWorker = new Worker(URL.createObjectURL(new Blob([code], { type: 'application/javascript' })));
    await new Promise(res => {
      _sfWorker.onmessage = e => { if (e.data === 'uciok') res(); };
      _sfWorker.postMessage('uci');
    });
    await new Promise(res => {
      _sfWorker.onmessage = e => { if (e.data === 'readyok') res(); };
      _sfWorker.postMessage('isready');
    });
    _sfReady = true;
    return _sfWorker;
  }

  function askStockfish(fen, depth) {
    return getStockfish().then(sf => new Promise(res => {
      sf.onmessage = e => { if (e.data.startsWith('bestmove')) res(e.data.split(' ')[1] || null); };
      sf.postMessage('ucinewgame');
      sf.postMessage('position fen ' + fen);
      sf.postMessage('go depth ' + depth);
    }));
  }

  async function requestHint() {
    if (gameOver) return;
    const isWhite = game.turn() === 'w';
    const used = isWhite ? hintsUsedWhite : hintsUsedBlack;
    if (hintLimit !== 0 && used >= hintLimit) return;

    if (isWhite) hintsUsedWhite++; else hintsUsedBlack++;
    updateHintBadges();

    const playerName = isWhite
      ? document.getElementById('name-white').value
      : document.getElementById('name-black').value;
    document.getElementById('hint-for-name').textContent = playerName;
    document.getElementById('hint-move-text').textContent = '...';
    document.getElementById('hint-explain').textContent = 'Stockfish is thinking... ♟';
    document.getElementById('hint-panel').style.display = 'block';
    document.getElementById('btn-hint').disabled = true;
    hintHighlight = null;
    renderBoard();

    try {
      const fen = game.fen();
      const bm = await askStockfish(fen, 15);
      if (!bm || bm === '(none)') throw new Error('No legal moves');
      const from = bm.slice(0, 2), to = bm.slice(2, 4), promo = bm.slice(4) || null;
      const PNAMES = { p: 'Pawn', n: 'Knight', b: 'Bishop', r: 'Rook', q: 'Queen', k: 'King' };
      const piece = game.get(from);
      const gameCopy = new Chess(fen);
      const result = gameCopy.move({ from, to, promotion: promo || 'q' });
      let explain = (piece ? PNAMES[piece.type] : '?') + ' ' + from + ' → ' + to;
      if (result) {
        if (result.captured) explain += '  (captures ' + (PNAMES[result.captured] || result.captured) + ')';
        if (promo) explain += '  → promotes to ' + (PNAMES[promo] || promo);
        if (gameCopy.in_checkmate()) explain += '  — Checkmate!';
        else if (gameCopy.in_check()) explain += '  — Gives check!';
      }
      document.getElementById('hint-move-text').textContent = result ? result.san : from + '-' + to;
      document.getElementById('hint-explain').textContent = explain;
      hintHighlight = { from, to };
      renderBoard();
    } catch (e) {
      document.getElementById('hint-move-text').textContent = '—';
      document.getElementById('hint-explain').textContent = '😕 Could not get hint: ' + e.message;
    } finally {
      updateHintBadges();
    }
  }

  // ---- Multiplayer ----
  function toggleMpPanel() {
    const p = document.getElementById('mp-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }

  function mpCreate() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    mpRoomId = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    mpColor = 'white';
    mpConnect();
  }

  function mpJoin() {
    const code = document.getElementById('mp-join-input').value.trim().toUpperCase();
    if (!code) return;
    mpRoomId = code;
    mpColor = 'black';
    mpConnect();
  }

  function mpConnect() {
    if (mpSocket) { try { mpSocket.close(); } catch(e) {} mpSocket = null; }
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/ws/${mpRoomId}/${mpColor}`;
    setMpStatus('Connecting...');
    mpSocket = new WebSocket(url);

    mpSocket.onopen = () => {
      document.getElementById('mp-code-display').textContent = mpRoomId;
      document.getElementById('mp-code-row').style.display = mpColor === 'white' ? 'flex' : 'none';
    };

    mpSocket.onmessage = (evt) => {
      const d = JSON.parse(evt.data);

      if (d.type === 'init') {
        mpMode = true;
        // Reset game state without calling newGame() (which would disconnect)
        game = new Chess(); selected = null; validMoves = []; lastMove = null;
        gameOver = false; hintHighlight = null;
        clearInterval(timerInterval); timerInterval = null; timerRunning = false;
        totalSecsW = parseInt(document.getElementById('total-w').value);
        totalSecsB = parseInt(document.getElementById('total-b').value);
        incSecsW   = parseInt(document.getElementById('inc-w').value);
        incSecsB   = parseInt(document.getElementById('inc-b').value);
        timerEnabled = totalSecsW > 0 || totalSecsB > 0;
        timeWhite = totalSecsW; timeBlack = totalSecsB;
        hintLimit = parseInt(document.getElementById('hint-limit-select').value);
        hintsUsedWhite = 0; hintsUsedBlack = 0;
        document.getElementById('btn-undo').disabled = true;
        document.getElementById('btn-surrender').disabled = false;
        document.getElementById('btn-pause').textContent = '⏸ Pause';
        document.getElementById('hint-panel').style.display = 'none';
        if (d.fen) { game.load(d.fen); if (d.last_move) lastMove = d.last_move; }
        renderBoard(); updateCaptures(); renderTimers(); updateStatus(); updateHintBadges(); updateBackground();
        const opp = d.opponent_online;
        setMpStatus(opp
          ? `✓ Opponent connected! You play ${mpColor}`
          : mpColor === 'white' ? `Waiting for opponent... share code: ${mpRoomId}` : 'Waiting for opponent to join...');

      } else if (d.type === 'opponent_joined') {
        setMpStatus(`✓ Opponent connected! You play ${mpColor}`);

      } else if (d.type === 'move') {
        const r = game.move({ from: d.move.from, to: d.move.to, promotion: d.move.promotion || 'q' });
        if (r) {
          playMoveSound(!!r.captured);
          lastMove = { from: d.move.from, to: d.move.to };
          if (d.timeWhite !== undefined) timeWhite = d.timeWhite;
          if (d.timeBlack !== undefined) timeBlack = d.timeBlack;
          if (!timerRunning && !gameOver) startTimer();
          renderBoard(); updateCaptures(); renderTimers(); updateStatus(); updateHintBadges();
        }

      } else if (d.type === 'opponent_left') {
        setMpStatus('⚠ Opponent disconnected');

      } else if (d.type === 'error') {
        setMpStatus('Error: ' + d.msg);
      }
    };

    mpSocket.onclose = () => { if (mpMode) setMpStatus('Disconnected'); mpMode = false; };
    mpSocket.onerror = () => setMpStatus('Connection error — is the server running?');
  }

  function setMpStatus(msg) {
    const el = document.getElementById('mp-status');
    if (el) el.textContent = msg;
  }

  // ---- Audio ----
  let _actx = null;
  function getACtx() {
    if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
    if (_actx.state === 'suspended') _actx.resume();
    return _actx;
  }
  function playMoveSound(isCapture) {
    try {
      const c = getACtx(), t = c.currentTime;
      const dur = isCapture ? 0.13 : 0.09;
      const freq = isCapture ? 650 : 1100;
      const vol  = isCapture ? 0.55 : 0.4;
      const buf = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(); src.buffer = buf;
      const filt = c.createBiquadFilter(); filt.type = 'bandpass';
      filt.frequency.value = freq; filt.Q.value = isCapture ? 0.7 : 1.2;
      const gain = c.createGain();
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(filt); filt.connect(gain); gain.connect(c.destination);
      src.start(t); src.stop(t + dur);
      if (isCapture) {
        const buf2 = c.createBuffer(1, Math.floor(c.sampleRate * 0.07), c.sampleRate);
        const d2 = buf2.getChannelData(0);
        for (let i = 0; i < d2.length; i++) d2[i] = Math.random() * 2 - 1;
        const src2 = c.createBufferSource(); src2.buffer = buf2;
        const filt2 = c.createBiquadFilter(); filt2.type = 'bandpass';
        filt2.frequency.value = 380; filt2.Q.value = 0.5;
        const gain2 = c.createGain();
        gain2.gain.setValueAtTime(0.35, t + 0.06);
        gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
        src2.connect(filt2); filt2.connect(gain2); gain2.connect(c.destination);
        src2.start(t + 0.06); src2.stop(t + 0.13);
      }
    } catch(e) {}
  }
  function playCheckSound() {
    try {
      const c = getACtx(), t = c.currentTime;
      [523, 784].forEach((freq, i) => {
        const osc = c.createOscillator(), gain = c.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        const dl = i * 0.14;
        gain.gain.setValueAtTime(0.22, t + dl);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dl + 0.18);
        osc.connect(gain); gain.connect(c.destination);
        osc.start(t + dl); osc.stop(t + dl + 0.18);
      });
    } catch(e) {}
  }
  function playGameOverSound() {
    try {
      const c = getACtx(), t = c.currentTime;
      [523, 415, 311].forEach((freq, i) => {
        const osc = c.createOscillator(), gain = c.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        const dl = i * 0.22;
        gain.gain.setValueAtTime(0.28, t + dl);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dl + 0.3);
        osc.connect(gain); gain.connect(c.destination);
        osc.start(t + dl); osc.stop(t + dl + 0.3);
      });
    } catch(e) {}
  }

  // ---- Square size (computed in JS for cross-browser reliability) ----
  function updateSqSize() {
    const vmin = Math.min(window.innerWidth, window.innerHeight);
    const sz = Math.min(110, Math.max(44, Math.floor((vmin - 220) / 8)));
    document.documentElement.style.setProperty('--sq-size', sz + 'px');
  }
  updateSqSize();
  window.addEventListener('resize', function() { updateSqSize(); renderBoard(); });

  // ---- Boot ----
  if (location.protocol === 'file:') {
    const btn = document.getElementById('btn-mp');
    btn.disabled = true;
    btn.title = 'Multiplayer requires the server (not available as a local file)';
  }
  newGame();
</script>
</body>
