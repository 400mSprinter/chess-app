<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leah's Chess – Built by Justin Song</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3148;
      --text: #e2e8f0;
      --text-dim: #6b7280;
      --accent: #6366f1;
      --accent-hover: #4f52d6;
      --light-sq: #f0d9b5;
      --dark-sq: #b58863;
      --selected: #7fc97f;
      --valid-dot: rgba(0,0,0,0.25);
      --last-move: rgba(255, 255, 100, 0.35);
      --check: rgba(220, 50, 50, 0.55);
      --hint-sq: rgba(245, 158, 11, 0.55);
      --sq-size: 64px;
      --rank-w: 20px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: background-color 0.7s ease;
    }

    /* Background tint by turn */
    body.bg-white-turn { background-color: #d8d2c5; }
    body.bg-black-turn { background-color: #06080e; }
    body.bg-white-turn h1 { color: #1c1810; }
    body.bg-white-turn h1 span { color: var(--accent); }
    body.bg-white-turn .board-labels-file span,
    body.bg-white-turn .rank-labels span { color: #4a3828; }
    body.bg-white-turn .status-bar {
      background: rgba(240,234,222,0.92);
      border-color: #b8b0a0;
      color: #1c1810;
    }
    body.bg-white-turn .status-bar.check { color: #dc2626; border-color: #dc2626; }
    body.bg-white-turn .status-bar.game-over { color: var(--accent); border-color: var(--accent); }
    body.bg-white-turn .hint-panel { background: rgba(250,245,235,0.95); border-color: #d97706; color: #1c1810; }
    body.bg-white-turn .hint-explain { color: #1c1810; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
      transition: color 0.5s;
    }
    h1 span { color: var(--accent); }

    .game-wrap {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Player panels */
    .player-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      width: 190px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .player-panel.active-turn {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .player-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .player-name-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      touch-action: manipulation;
    }
    .player-name-input:focus { outline: none; border-color: var(--accent); }

    .timer {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      letter-spacing: 0.04em;
    }
    .timer.white-timer { background: var(--light-sq); color: #3d2b1f; }
    .timer.black-timer { background: var(--dark-sq); color: #fff; }
    .timer.ticking { box-shadow: 0 0 0 2px var(--accent); }
    .timer.low { color: #ef4444 !important; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Per-player timer config */
    .player-timer-config {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .player-timer-config select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 4px 5px;
      font-size: 11px;
      flex: 1;
      min-width: 0;
    }
    .player-timer-config select:focus { outline: none; border-color: var(--accent); }

    .captured-pieces {
      min-height: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      font-size: 22px;
      line-height: 1.2;
    }
    .captured-pieces .cap-w {
      color: #fffff0;
      text-shadow: -1.5px -1.5px 0 #2d1b0e, 1.5px -1.5px 0 #2d1b0e,
                   -1.5px  1.5px 0 #2d1b0e, 1.5px  1.5px 0 #2d1b0e;
    }
    .captured-pieces .cap-b { color: #0a0a0a; }

    /* Hint badge */
    .hint-badge-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .hint-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1px 9px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    .hint-count.out { color: #ef4444; border-color: #ef4444; }

    /* Board */
    .board-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
    .board-with-ranks { display: flex; align-items: stretch; }
    .rank-labels {
      display: flex;
      flex-direction: column;
      margin-right: 4px;
      flex-shrink: 0;
    }
    .rank-labels span {
      width: var(--rank-w);
      height: var(--sq-size);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-dim);
      transition: color 0.5s;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, var(--sq-size));
      grid-template-rows: repeat(8, var(--sq-size));
      width: calc(var(--sq-size) * 8);
      height: calc(var(--sq-size) * 8);
      border: 3px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      user-select: none;
    }

    .file-row { display: flex; align-items: center; }
    .rank-spacer { width: calc(var(--rank-w) + 4px); flex-shrink: 0; }
    .board-labels-file {
      display: flex;
      width: calc(var(--sq-size) * 8);
      padding: 0 2px;
    }
    .board-labels-file span {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      transition: color 0.5s;
    }

    .sq {
      width: var(--sq-size);
      height: var(--sq-size);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: filter 0.1s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .sq:hover { filter: brightness(1.1); }
    .sq.light { background: var(--light-sq); }
    .sq.dark  { background: var(--dark-sq); }
    .sq.selected    { background: var(--selected) !important; }
    .sq.last-move   { background-color: var(--last-move) !important; background-blend-mode: multiply; }
    .sq.in-check    { background: var(--check) !important; }
    .sq.hint-sq     { background: var(--hint-sq) !important; }

    .sq.valid-move::after {
      content: '';
      position: absolute;
      width: 28%; height: 28%;
      border-radius: 50%;
      background: var(--valid-dot);
      pointer-events: none;
    }
    .sq.valid-capture::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 6px solid var(--valid-dot);
      pointer-events: none;
    }

    .piece {
      font-size: calc(var(--sq-size) * 0.82);
      line-height: 1;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: transform 0.08s;
    }
    .piece:hover { transform: scale(1.1); }
    .piece-white {
      color: #fffff0;
      text-shadow:
        -2px -2px 0 #2d1b0e,  2px -2px 0 #2d1b0e,
        -2px  2px 0 #2d1b0e,  2px  2px 0 #2d1b0e,
         0    0   6px rgba(0,0,0,0.5);
    }
    .piece-black { color: #0a0a0a; text-shadow: none; }

    .sq-coord {
      position: absolute;
      bottom: 2px;
      left: 3px;
      font-size: calc(var(--sq-size) * 0.16);
      line-height: 1;
      pointer-events: none;
      z-index: 0;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .sq.light .sq-coord { color: rgba(70, 40, 15, 0.38); }
    .sq.dark  .sq-coord { color: rgba(255, 235, 195, 0.45); }
    .sq.selected .sq-coord, .sq.hint-sq .sq-coord { opacity: 0.6; }

    /* Status bar */
    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      min-width: calc(var(--sq-size) * 8 + var(--rank-w) + 4px);
      transition: background 0.5s, border-color 0.5s, color 0.5s;
    }
    .status-bar.check { border-color: #ef4444; color: #ef4444; }
    .status-bar.game-over { border-color: var(--accent); color: var(--accent); font-size: 16px; }

    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      transition: background 0.15s, opacity 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--surface2); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-hint { background: #f59e0b; color: #1a0f00; font-weight: 700; }
    .btn-hint:hover:not(:disabled) { background: #d97706; }
    .btn-hint:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-surrender { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
    .btn-surrender:hover:not(:disabled) { background: rgba(239,68,68,0.12); }
    .btn-surrender:disabled { opacity: 0.35; cursor: not-allowed; }

    .game-config {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
      flex-wrap: wrap;
    }
    .game-config select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 5px 8px;
      font-size: 13px;
    }
    .cfg-sep { color: var(--border); font-size: 14px; }

    /* Hint panel */
    .hint-panel {
      background: var(--surface);
      border: 1px solid #f59e0b;
      border-radius: 10px;
      padding: 14px 18px;
      max-width: calc(var(--sq-size) * 8 + var(--rank-w) + 4px);
      width: 100%;
      transition: background 0.5s;
    }
    .hint-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #f59e0b;
      margin-bottom: 6px;
    }
    .hint-move-row {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .hint-move-row strong { color: #f59e0b; font-size: 17px; margin-left: 4px; }
    .hint-explain { font-size: 14px; line-height: 1.65; color: var(--text); transition: color 0.5s; }

    /* Log panel */
    .log-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      max-width: calc(var(--sq-size) * 8 + var(--rank-w) + 4px);
      width: 100%;
    }
    .log-header {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .log-entries {
      height: 120px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.65;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .log-entry { padding: 1px 2px; white-space: pre-wrap; word-break: break-word; }
    .log-move  { color: var(--text); }
    .log-event { color: var(--text-dim); }
    .log-game  { color: var(--accent); font-weight: 600; }

    /* Multiplayer panel */
    .mp-panel {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      width: 100%;
    }
    .mp-row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
    .mp-sep { color: var(--border); padding-bottom: 6px; font-size: 18px; }
    .mp-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 5px; }
    .mp-join-row { display: flex; gap: 6px; align-items: flex-end; }
    .mp-input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 6px 10px; font-size: 16px; font-weight: 700;
      letter-spacing: 0.12em; width: 76px; text-transform: uppercase;
    }
    .mp-input:focus { outline: none; border-color: var(--accent); }
    .mp-code-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--text-dim); }
    .mp-code { font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: 0.18em; }
    .mp-status { margin-top: 8px; font-size: 13px; color: var(--text-dim); min-height: 18px; }

    /* Capture notification toast */
    .capture-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--surface);
      border: 2px solid #ef4444;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .capture-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .capture-toast .toast-icon { font-size: 22px; margin-right: 8px; }

    /* Extra time request toast */
    .time-request-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--surface);
      border: 2px solid #f59e0b;
      border-radius: 12px;
      padding: 14px 22px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      z-index: 1001;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .time-request-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .time-request-toast .toast-btns { display: flex; gap: 8px; justify-content: center; }
    .time-request-toast .btn-grant { background: #22c55e; color: #fff; font-weight: 700; padding: 6px 18px; }
    .time-request-toast .btn-grant:hover { background: #16a34a; }
    .time-request-toast .btn-deny { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 6px 18px; }
    .time-request-toast .btn-deny:hover { background: rgba(239,68,68,0.12); }

    /* Hint used notification */
    .hint-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--surface);
      border: 2px solid #f59e0b;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      color: #f59e0b;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .hint-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Check notification toast */
    .check-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--surface);
      border: 2px solid #ef4444;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 17px;
      font-weight: 700;
      color: #ef4444;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .check-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Undo request toast */
    .undo-request-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--surface);
      border: 2px solid #8b5cf6;
      border-radius: 12px;
      padding: 14px 22px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      z-index: 1002;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .undo-request-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .undo-request-toast .toast-btns { display: flex; gap: 8px; justify-content: center; }
    .undo-request-toast .btn-grant { background: #22c55e; color: #fff; font-weight: 700; padding: 6px 18px; }
    .undo-request-toast .btn-grant:hover { background: #16a34a; }
    .undo-request-toast .btn-deny { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 6px 18px; }
    .undo-request-toast .btn-deny:hover { background: rgba(239,68,68,0.12); }

    /* Extra time button */
    .btn-extra-time {
      background: transparent;
      border: 1px solid #f59e0b;
      color: #f59e0b;
      font-size: 11px;
      padding: 4px 10px;
      width: 100%;
    }
    .btn-extra-time:hover:not(:disabled) { background: rgba(245,158,11,0.12); }
    .btn-extra-time:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Flip board button */
    .btn-flip { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-flip:hover { background: var(--surface2); }

    /* Disabled config look */
    .player-timer-config.locked select { opacity: 0.4; pointer-events: none; }
    .game-config.locked select { opacity: 0.4; pointer-events: none; }

    @media (max-width: 1100px) {
      .board-wrap { order: -1; }
    }

    /* ── Tablet (iPad): 600 – 1100px ── */
    @media (min-width: 600px) and (max-width: 1100px) {
      .player-panel { width: 155px; }
      .timer { font-size: 26px; }
      button { min-height: 42px; }
    }

    /* ── Mobile: ≤ 599px ── */
    @media (max-width: 599px) {
      body { padding: 8px; }

      h1 { font-size: 16px; margin-bottom: 8px; }

      /* Stack everything in one column */
      .game-wrap {
        flex-direction: column;
        gap: 6px;
        width: 100%;
      }

      /* Player panels → compact horizontal strips */
      .player-panel {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        padding: 8px 10px;
        gap: 6px 10px;
        border-radius: 8px;
      }
      .player-label { display: none; }
      .player-name-input {
        width: auto;
        min-width: 65px;
        max-width: 90px;
        font-size: 13px;
        padding: 4px 8px;
        flex-shrink: 0;
      }
      .timer {
        font-size: 22px;
        padding: 4px 10px;
        flex-shrink: 0;
      }
      /* Timer config too cramped on mobile — hide it */
      .player-timer-config { display: none; }
      .captured-pieces { flex: 1; font-size: 16px; min-height: 18px; }
      .hint-badge-row { font-size: 11px; gap: 4px; }
      .hint-count { padding: 1px 6px; font-size: 11px; }
      .btn-extra-time { padding: 6px 10px; font-size: 11px; width: auto; }
      .btn-ready { padding: 7px 12px; font-size: 12px; width: auto; }

      /* Mobile ready bar: shown at top by default, moves to bottom after game starts */
      #mobile-ready-bar {
        display: flex;
        gap: 8px;
        width: 100%;
        order: -10;
      }
      #mobile-ready-bar .btn-ready { flex: 1; font-size: 13px; }
      body.game-started #mobile-ready-bar { order: 100; }
      /* Hide the original per-panel ready buttons on mobile */
      #btn-ready-black, #btn-ready-white { display: none; }

      /* Functionality buttons below chat, log below that */
      .controls  { order: 10; }
      .mp-panel  { order: 11; }
      .log-panel { order: 12; max-width: unset; }

      /* Board */
      .board-wrap { width: 100%; gap: 4px; }
      .status-bar {
        font-size: 13px;
        padding: 8px 12px;
        min-width: unset;
        width: 100%;
      }

      /* Bigger touch targets for all buttons */
      button { padding: 10px 12px; font-size: 12px; min-height: 42px; }
      .controls { gap: 5px; }
      .game-config { font-size: 12px; gap: 5px; width: 100%; }
      .game-config select { font-size: 12px; padding: 4px 4px; }

      /* Panels */
      .hint-panel { max-width: unset; padding: 10px 12px; }
      .hint-explain { font-size: 13px; }
      .chat-panel { max-width: unset; padding: 10px 12px; }
      .chat-messages { height: 70px; font-size: 12px; }
      .chat-input { font-size: 13px; touch-action: manipulation; }
      .mp-panel { padding: 10px 12px; }
      .mp-row { gap: 8px; }
      .mp-code { font-size: 20px; }
      .mp-input { width: 65px; font-size: 14px; touch-action: manipulation; }
    }

    /* Mobile-only ready bar: hidden on tablet/desktop, flex on mobile (set in media query below) */
    @media (min-width: 600px) { #mobile-ready-bar { display: none; } }

    /* Ready button */
    .btn-ready {
      background: #22c55e;
      color: #fff;
      font-weight: 700;
      width: 100%;
      font-size: 13px;
    }
    .btn-ready:hover:not(:disabled) { background: #16a34a; }
    .btn-ready.is-ready { background: transparent; border: 1px solid #22c55e; color: #22c55e; cursor: default; }
    .btn-ready:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Chat panel */
    .chat-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      max-width: calc(var(--sq-size) * 8 + var(--rank-w) + 4px);
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-header {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .chat-messages {
      height: 100px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 13px;
      line-height: 1.4;
    }
    .chat-msg .chat-name { font-weight: 700; }
    .white-name { color: #d4b896; }
    .black-name { color: #b58863; }
    .chat-input-row { display: flex; gap: 6px; }
    .chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
    }
    .chat-input:focus { outline: none; border-color: var(--accent); }

    /* Rejoin banner */
    .rejoin-banner {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 12px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 700px;
    }
    .rejoin-banner strong { color: var(--accent); }
    .rejoin-banner .btn-outline { padding: 6px 14px; font-size: 13px; }

    /* "You are playing as" banner */
    .you-are-banner {
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.03em;
      width: 100%;
    }
    .you-are-banner.white {
      background: rgba(240,217,181,0.15);
      border: 1px solid var(--light-sq);
      color: var(--light-sq);
    }
    .you-are-banner.black {
      background: rgba(181,136,99,0.15);
      border: 1px solid var(--dark-sq);
      color: #d4a870;
    }

    /* YOU badge inside player panel */
    .you-badge {
      display: none;
      font-size: 10px;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      padding: 1px 6px;
      font-weight: 700;
      letter-spacing: 0.04em;
      vertical-align: middle;
      margin-left: 4px;
    }
  </style>
</head>
<body>

<h1>♟ <span>Leah's Chess</span> <small style="font-size:12px;font-weight:400;color:var(--text-dim);margin-left:6px;">Built by Justin Song</small></h1>

<div id="rejoin-banner" class="rejoin-banner" style="display:none">
  ↩ 이전 게임에 다시 참여할까요? 방 코드 <strong id="rejoin-code">—</strong>, <strong id="rejoin-color-text">—</strong>으로
  <button class="btn-primary" onclick="rejoinGame()">재접속</button>
  <button class="btn-outline" onclick="dismissRejoin()">취소</button>
</div>

<div id="capture-toast" class="capture-toast"></div>

<div class="game-wrap">

  <!-- Mobile-only ready bar: sits at top pre-game, bottom after game starts -->
  <div id="mobile-ready-bar" class="mobile-ready-bar">

  </div>

  <!-- Black player -->
  <div class="player-panel" id="panel-black">
    <div class="player-label">Black ■ <span class="you-badge" id="you-badge-black">YOU</span></div>
    <input class="player-name-input" id="name-black" value="Grandma" oninput="onNameChange('black')" />
    <div class="timer black-timer" id="timer-black">10:00</div>
    <div class="player-timer-config">
      ⏱
      <select id="total-b" onchange="onTimeChange()">

        <option value="300">5m</option>

      <select id="inc-b" onchange="onTimeChange()">
        <option value="0" selected>0s</option>
        <option value="1">+1s</option>

        <option value="3">+3s</option>
        <option value="5">+5s</option>

    <button class="btn-ready" id="btn-ready-black" onclick="toggleReady('black')">⏵ Ready</button>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="board-with-ranks">
      <div class="rank-labels" id="rank-labels"></div>
      <div id="board"></div>
    </div>
    <div class="file-row">
      <div class="rank-spacer"></div>
      <div class="board-labels-file" id="file-labels"></div>
    </div>
    <div id="you-are-banner" class="you-are-banner" style="display:none"></div>
    <div class="status-bar" id="status">White's turn</div>
    <div class="controls">
      <button class="btn-primary" onclick="newGame()">New Game</button>
      <button class="btn-outline" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
      <button class="btn-outline" id="btn-undo" onclick="undoMove()">↩ Undo</button>
      <button class="btn-hint" id="btn-hint" onclick="requestHint()">💡 Hint</button>
      <button class="btn-surrender" id="btn-surrender" onclick="surrender()">🏳 Surrender</button>
      <button class="btn-flip" id="btn-flip" onclick="flipBoard()">🔄 Flip</button>
      <button class="btn-outline" id="btn-mp" onclick="toggleMpPanel()">🌐 Multi</button>
      <div class="game-config">
        Preset:
        <select id="preset-select" onchange="applyPreset()">
          <option value="">Custom</option>
          <optgroup label="Bullet">
            <option value="60:0">1+0</option>
            <option value="60:1">1+1</option>
            <option value="120:1">2+1</option>
          </optgroup>
          <optgroup label="Blitz">
            <option value="180:0">3+0</option>
            <option value="180:2">3+2</option>
            <option value="300:0">5+0</option>
            <option value="300:3">5+3</option>
          </optgroup>
          <optgroup label="Rapid">
            <option value="600:0">10+0</option>
            <option value="600:5">10+5</option>
            <option value="600:10">10+10</option>
            <option value="900:10">15+10</option>
          </optgroup>
          <optgroup label="Classical">
            <option value="1800:0">30+0</option>
            <option value="1800:20">30+20</option>
          </optgroup>
          <option value="0:0">No limit</option>
        </select>
        <span class="cfg-sep">|</span>
        💡
        <select id="hint-limit-select" onchange="onHintLimitChange()" title="Hints per player">
          <option value="1">1 ea</option>
          <option value="3" selected>3 ea</option>
          <option value="5">5 ea</option>
          <option value="10">10 ea</option>
          <option value="0">∞</option>
        </select>
      </div>
    </div>
    <div id="mp-panel" class="mp-panel" style="display:none">
      <div class="mp-row">
        <div>
          <div class="mp-label">Host a game</div>
          <button class="btn-primary" onclick="mpCreate()">Create</button>
        </div>
        <div class="mp-sep">|</div>
        <div class="mp-join-row">
          <div>
            <div class="mp-label">Join a game</div>
            <input id="mp-join-input" class="mp-input" placeholder="CODE" maxlength="6"
              oninput="this.value=this.value.toUpperCase()"
              onkeydown="if(event.key==='Enter')mpJoin()" />
          </div>
          <button class="btn-outline" onclick="mpJoin()">Join</button>
        </div>
      </div>
      <div id="mp-code-row" class="mp-code-row" style="display:none">
        Share this code: <strong id="mp-code-display" class="mp-code">—</strong>
      </div>
      <div id="mp-status" class="mp-status"></div>
    </div>

    <div id="hint-panel" class="hint-panel" style="display:none">
      <div class="hint-header">💡 Hint for <span id="hint-for-name">—</span></div>
      <div class="hint-move-row">Best move: <strong id="hint-move-text">—</strong></div>
      <div class="hint-explain" id="hint-explain"></div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">💬 Chat</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" class="chat-input" placeholder="Type a message..."
          maxlength="200" onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="btn-outline" onclick="sendChat()">Send</button>

    <div class="log-panel">
      <div class="log-header">📋 Game Log</div>
      <div class="log-entries" id="log-entries"></div>

  </div>

  <!-- White player -->
  <div class="player-panel" id="panel-white">
    <div class="player-label">White □ <span class="you-badge" id="you-badge-white">YOU</span></div>
    <input class="player-name-input" id="name-white" value="Leah" oninput="onNameChange('white')" />
    <div class="timer white-timer" id="timer-white">10:00</div>
    <div class="player-timer-config">
      ⏱
      <select id="total-w" onchange="onTimeChange()">
        <option value="60">1m</option>
        <option value="120">2m</option>
        <option value="180">3m</option>
        <option value="300">5m</option>
        <option value="600" selected>10m</option>
        <option value="900">15m</option>
        <option value="1800">30m</option>
        <option value="0">∞</option>
      </select>
      +
      <select id="inc-w" onchange="onTimeChange()">
        <option value="0" selected>0s</option>
        <option value="1">+1s</option>
        <option value="2">+2s</option>
        <option value="3">+3s</option>
        <option value="5">+5s</option>
        <option value="10">+10s</option>
        <option value="15">+15s</option>
        <option value="20">+20s</option>
        <option value="30">+30s</option>
      </select>
    </div>
    <div class="captured-pieces" id="cap-white"></div>
    <div class="hint-badge-row">💡 <span class="hint-count" id="hint-badge-white">3</span> hints left</div>
    <button class="btn-extra-time" id="btn-extra-time-white" onclick="askExtraTime('white')" style="display:none">⏱ Ask +1 min</button>
    <button class="btn-ready" id="btn-ready-white" onclick="toggleReady('white')">⏵ Ready</button>
  </div>

</div>

<script>
  const PIECES = {
    wK: '♔', wQ: '♕', wR: '♖', wB: '♗', wN: '♘', wP: '♙',
    bK: '♚', bQ: '♛', bR: '♜', bB: '♝', bN: '♞', bP: '♟',
  };
  const FILES = ['a','b','c','d','e','f','g','h'];
  const PIECE_ORDER = { p: 0, n: 1, b: 2, r: 3, q: 4 };

  let game = new Chess();
  let selected = null;
  let validMoves = [];
  let lastMove = null;
  let gameOver = false;
  let hintHighlight = null;

  // Multiplayer
  let mpMode = false, mpColor = null, mpSocket = null, mpRoomId = null;

  // Per-player Fischer clock
  let totalSecsW = 600, totalSecsB = 600;
  let incSecsW = 0,     incSecsB = 0;
  let timeWhite, timeBlack;
  let timerInterval = null;
  let timerEnabled = true;
  let timerRunning = false;

  // Hints
  let hintLimit = 3;
  let hintsUsedWhite = 0;
  let hintsUsedBlack = 0;

  // Ready state
  let readyWhite = false, readyBlack = false;

  // Board orientation: false = white on bottom, true = black on bottom
  let boardFlipped = false;

  // Game started flag (for locking settings and preventing refresh)
  let gameStarted = false;

  // Piece names for notifications
  const PNAME_MAP = { p: 'Pawn', n: 'Knight', b: 'Bishop', r: 'Rook', q: 'Queen', k: 'King' };

  // ---- Init ----
  function newGame() {
    if (mpMode) {
      mpMode = false;
      try { if (mpSocket) mpSocket.close(); } catch(e) {}
      mpSocket = null;
      setMpStatus('');
      document.getElementById('mp-panel').style.display = 'none';
    }
    clearMpSession();
    updateYouAreBanner();
    game = new Chess();
    selected = null;
    validMoves = [];
    lastMove = null;
    gameOver = false;
    hintHighlight = null;

    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;

    totalSecsW = parseInt(document.getElementById('total-w').value);
    totalSecsB = parseInt(document.getElementById('total-b').value);
    incSecsW   = parseInt(document.getElementById('inc-w').value);
    incSecsB   = parseInt(document.getElementById('inc-b').value);
    timerEnabled = totalSecsW > 0 || totalSecsB > 0;
    timeWhite = totalSecsW;
    timeBlack = totalSecsB;

    hintLimit = parseInt(document.getElementById('hint-limit-select').value);
    hintsUsedWhite = 0;
    hintsUsedBlack = 0;
    readyWhite = false;
    readyBlack = false;
    gameStarted = false;
    document.body.classList.remove('game-started');
    const logEl = document.getElementById('log-entries');
    if (logEl) logEl.innerHTML = '';
    addLog('🟢 New game — waiting for players to ready up', 'game');

    document.getElementById('btn-undo').disabled = false;
    document.getElementById('btn-surrender').disabled = false;
    document.getElementById('btn-pause').textContent = '⏸ Pause';
    document.getElementById('hint-panel').style.display = 'none';

    unlockSettings();
    updateExtraTimeButtons();

    renderBoard();
    updateCaptures();
    renderTimers();
    updateStatus();
    updateHintBadges();
    updateReadyButtons();
    updateBackground();
  }

  function applyPreset() {
    const val = document.getElementById('preset-select').value;
    if (!val) return;
    const [total, inc] = val.split(':');
    // Apply same settings to both players
    document.getElementById('total-w').value = total;
    document.getElementById('total-b').value = total;
    document.getElementById('inc-w').value   = inc;
    document.getElementById('inc-b').value   = inc;
    onTimeChange(true);
  }

  function onTimeChange(fromPreset = false) {
    if (!fromPreset) document.getElementById('preset-select').value = '';
    const s = document.getElementById('status');
    s.textContent = 'Timer change applies on New Game';
    setTimeout(() => { if (!gameOver) updateStatus(); }, 1500);
  }

  function onHintLimitChange() {
    const s = document.getElementById('status');
    s.textContent = 'Hint limit applies on New Game';
    setTimeout(() => { if (!gameOver) updateStatus(); }, 1500);
  }

  function togglePause() {
    if (gameOver || !timerEnabled) return;
    if (timerRunning) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerRunning = false;
      document.getElementById('btn-pause').textContent = '▶ Resume';
      setStatus('Game paused', '');
    } else {
      startTimer();
      updateStatus();
    }
  }

  // ---- Timer ----
  function startTimer() {
    if (!timerEnabled) return;
    clearInterval(timerInterval);
    timerInterval = setInterval(tickTimer, 1000);
    timerRunning = true;
    document.getElementById('btn-pause').textContent = '⏸ Pause';
  }

  function tickTimer() {
    if (gameOver) { clearInterval(timerInterval); timerRunning = false; return; }
    const turn = game.turn();
    if (turn === 'w' && totalSecsW > 0) {
      timeWhite--;
      if (timeWhite <= 0) { timeWhite = 0; renderTimers(); onTimeout('w'); return; }
    } else if (turn === 'b' && totalSecsB > 0) {
      timeBlack--;
      if (timeBlack <= 0) { timeBlack = 0; renderTimers(); onTimeout('b'); return; }
    }
    renderTimers();
  }

  function onTimeout(color) {
    clearInterval(timerInterval);
    timerRunning = false;
    gameOver = true;
    const winner = color === 'w'
      ? document.getElementById('name-black').value
      : document.getElementById('name-white').value;
    playGameOverSound();
    setStatus(`⏰ Time's up! ${winner} wins on time!`, 'game-over');
    addLog(`⏰ Time's up! ${winner} wins on time!`, 'game');
    updateBackground();
  }

  function renderTimers() {
    const wEl = document.getElementById('timer-white');
    const bEl = document.getElementById('timer-black');
    const isWhiteTurn = game.turn() === 'w';

    wEl.textContent = totalSecsW > 0 ? formatTime(timeWhite) : '—';
    bEl.textContent = totalSecsB > 0 ? formatTime(timeBlack) : '—';

    wEl.classList.toggle('ticking', isWhiteTurn  && totalSecsW > 0 && timerRunning && !gameOver);
    bEl.classList.toggle('ticking', !isWhiteTurn && totalSecsB > 0 && timerRunning && !gameOver);
    wEl.classList.toggle('low', totalSecsW > 0 && timeWhite > 0 && timeWhite <= 30);
    bEl.classList.toggle('low', totalSecsB > 0 && timeBlack > 0 && timeBlack <= 30);

    document.getElementById('panel-white').classList.toggle('active-turn', isWhiteTurn && !gameOver);
    document.getElementById('panel-black').classList.toggle('active-turn', !isWhiteTurn && !gameOver);

    updateBackground();
  }

  function formatTime(secs) {
    const m = Math.floor(secs / 60).toString().padStart(2, '0');
    const s = (secs % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  // ---- Background by turn ----
  function updateBackground() {
    const wt = !gameOver && game.turn() === 'w';
    const bt = !gameOver && game.turn() === 'b';
    document.body.classList.toggle('bg-white-turn', wt);
    document.body.classList.toggle('bg-black-turn', bt);
  }

  // ---- Captured pieces ----
  function updateCaptures() {
    const wCap = [], bCap = [];
    for (const move of game.history({ verbose: true })) {
      if (move.captured) {
        if (move.color === 'w') wCap.push(move.captured);
        else bCap.push(move.captured);
      }
    }
    wCap.sort((a, b) => PIECE_ORDER[a] - PIECE_ORDER[b]);
    bCap.sort((a, b) => PIECE_ORDER[a] - PIECE_ORDER[b]);
    document.getElementById('cap-white').innerHTML =
      wCap.map(p => `<span class="cap-b">${PIECES['b' + p.toUpperCase()]}</span>`).join('');
    document.getElementById('cap-black').innerHTML =
      bCap.map(p => `<span class="cap-w">${PIECES['w' + p.toUpperCase()]}</span>`).join('');
  }

  // ---- Board rendering ----
  function renderBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';

    const rankLabelsEl = document.getElementById('rank-labels');
    rankLabelsEl.innerHTML = '';
    const rankOrder = boardFlipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
    const fileOrder = boardFlipped ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];

    for (const rank of rankOrder) {
      const span = document.createElement('span');
      span.textContent = rank;
      rankLabelsEl.appendChild(span);
    }

    for (const rank of rankOrder) {
      for (const fileIdx of fileOrder) {
        const file = FILES[fileIdx];
        const sqName = file + rank;
        const isLight = (fileIdx + rank) % 2 !== 0;

        const sqEl = document.createElement('div');
        sqEl.className = 'sq ' + (isLight ? 'light' : 'dark');
        sqEl.dataset.sq = sqName;

        if (lastMove && (lastMove.from === sqName || lastMove.to === sqName))
          sqEl.classList.add('last-move');
        if (game.in_check()) {
          const kingPos = findKing(game.turn());
          if (sqName === kingPos) sqEl.classList.add('in-check');
        }
        if (selected === sqName) sqEl.classList.add('selected');
        if (hintHighlight && (sqName === hintHighlight.from || sqName === hintHighlight.to))
          sqEl.classList.add('hint-sq');

        if (selected) {
          const move = validMoves.find(m => m.to === sqName);
          if (move) {
            const piece = game.get(sqName);
            sqEl.classList.add(piece ? 'valid-capture' : 'valid-move');
          }
        }

        const piece = game.get(sqName);
        if (piece) {
          const key = (piece.color === 'w' ? 'w' : 'b') + piece.type.toUpperCase();
          const pieceEl = document.createElement('span');
          pieceEl.className = 'piece ' + (piece.color === 'w' ? 'piece-white' : 'piece-black');
          pieceEl.textContent = PIECES[key] || '?';
          sqEl.appendChild(pieceEl);
        }

        const coordEl = document.createElement('span');
        coordEl.className = 'sq-coord';
        coordEl.textContent = sqName;
        sqEl.appendChild(coordEl);

        sqEl.addEventListener('click', () => onSquareClick(sqName));
        boardEl.appendChild(sqEl);
      }
    }

    const labelsEl = document.getElementById('file-labels');
    const orderedFiles = boardFlipped ? [...FILES].reverse() : FILES;
    labelsEl.innerHTML = orderedFiles.map(f => `<span>${f}</span>`).join('');
  }

  function findKing(color) {
    for (let r = 1; r <= 8; r++) {
      for (let f of FILES) {
        const sq = f + r;
        const p = game.get(sq);
        if (p && p.type === 'k' && p.color === color) return sq;
      }
    }
    return null;
  }

  // ---- Click handler ----
  function onSquareClick(sqName) {
    if (gameOver) return;
    if (!readyWhite || !readyBlack) return;
    if (mpMode) {
      const myTurn = (mpColor === 'white' && game.turn() === 'w') ||
                     (mpColor === 'black' && game.turn() === 'b');
      if (!myTurn) return;
    }
    const piece = game.get(sqName);

    if (selected) {
      // Click the already-selected piece → deselect
      if (sqName === selected) {
        selected = null;
        validMoves = [];
        renderBoard();
        return;
      }

      const move = validMoves.find(m => m.to === sqName);
      if (move) {
        const movingPiece = game.get(selected);
        const capturedPiece = game.get(sqName);
        const result = game.move({ from: selected, to: sqName, promotion: 'q' });
        if (result) {
          // Mark game as started and lock settings on first move
          if (!gameStarted) { gameStarted = true; document.body.classList.add('game-started'); lockSettings(); updateExtraTimeButtons(); }
          playMoveSound(!!result.captured);
          // Show capture notification
          if (result.captured && movingPiece) {
            const attackerName = movingPiece.color === 'w'
              ? document.getElementById('name-white').value
              : document.getElementById('name-black').value;
            const victimName = movingPiece.color === 'w'
              ? document.getElementById('name-black').value
              : document.getElementById('name-white').value;
            const capPieceName = PNAME_MAP[result.captured] || result.captured;
            const atkPieceName = PNAME_MAP[movingPiece.type] || movingPiece.type;
            showCaptureToast(victimName, capPieceName, attackerName, atkPieceName);
          }
          lastMove = { from: selected, to: sqName };
          selected = null;
          validMoves = [];
          hintHighlight = null;
          document.getElementById('hint-panel').style.display = 'none';
          { // log the move
            const moverName = result.color === 'w'
              ? document.getElementById('name-white').value
              : document.getElementById('name-black').value;
            let logMsg = `♟ ${moverName}: ${result.san}`;
            if (result.captured) logMsg += ` ✕${PNAME_MAP[result.captured]||result.captured}`;
            addLog(logMsg, 'move');
          }
          // Fischer increment for the player who just moved
          if (game.turn() === 'b' && totalSecsW > 0 && incSecsW > 0) timeWhite += incSecsW;
          else if (game.turn() === 'w' && totalSecsB > 0 && incSecsB > 0) timeBlack += incSecsB;
          if (!timerRunning && !gameOver) startTimer();
          renderBoard();
          updateCaptures();
          renderTimers();
          updateStatus();
          updateHintBadges();
          if (mpMode && mpSocket && mpSocket.readyState === WebSocket.OPEN) {
            mpSocket.send(JSON.stringify({
              type: 'move', fen: game.fen(),
              move: { from: result.from, to: result.to, promotion: result.promotion || 'q' },
              captured: !!result.captured, timeWhite, timeBlack
            }));
          }
          return;
        }
      }
      // Re-select own piece
      if (piece && piece.color === (game.turn() === 'w' ? 'w' : 'b')) {
        selected = sqName;
        validMoves = game.moves({ square: sqName, verbose: true });
        renderBoard();
        return;
      }
      // Deselect
      selected = null;
      validMoves = [];
      renderBoard();
      return;
    }

    if (piece && piece.color === (game.turn() === 'w' ? 'w' : 'b')) {
      selected = sqName;
      validMoves = game.moves({ square: sqName, verbose: true });
      renderBoard();
    }
  }

  function updateStatus() {
    if (!readyWhite || !readyBlack) {
      const wMark = readyWhite ? '✓' : '⏵';
      const bMark = readyBlack ? '✓' : '⏵';
      setStatus(`Waiting — White ${wMark}  Black ${bMark}  · click Ready to start`);
      return;
    }
    if (game.in_checkmate()) {
      const winner = game.turn() === 'w'
        ? document.getElementById('name-black').value
        : document.getElementById('name-white').value;
      setStatus(`♛ Checkmate! ${winner} wins!`, 'game-over');
      if (!gameOver) addLog(`🏆 Checkmate! ${winner} wins!`, 'game');
      gameOver = true;
      playGameOverSound();
      clearInterval(timerInterval);
      document.getElementById('btn-undo').disabled = true;
      document.getElementById('btn-surrender').disabled = true;
      updateBackground();
    } else if (game.in_stalemate()) {
      setStatus('½ Stalemate — Draw!', 'game-over');
      if (!gameOver) addLog('½ Stalemate — Draw!', 'game');
      gameOver = true;
      playGameOverSound();
      clearInterval(timerInterval);
      document.getElementById('btn-surrender').disabled = true;
      updateBackground();
    } else if (game.in_draw()) {
      setStatus('½ Draw!', 'game-over');

      gameOver = true;
      playGameOverSound();
      clearInterval(timerInterval);
      document.getElementById('btn-surrender').disabled = true;
      updateBackground();
    } else if (game.in_check()) {
      const who = game.turn() === 'w'
        ? document.getElementById('name-white').value
        : document.getElementById('name-black').value;

        ? document.getElementById('name-white').value

  // ---- Undo ----
  let _pendingUndoRequest = false;
  function undoMove() {
    if (gameOver) return;
    if (_pendingUndoRequest) return;
    // Check if there is a move to undo
    if (game.history().length === 0) return;

    // Determine who is requesting the undo (current turn's player wants to undo opponent's last move,
    // or more commonly, the player who just moved wants to take it back — either way, ask the opponent)
    const requesterColor = game.turn() === 'w' ? 'black' : 'white';
    const requesterName = document.getElementById('name-' + requesterColor).value;
    const opponentName = game.turn() === 'w'
      ? document.getElementById('name-white').value
      : document.getElementById('name-black').value;

    _pendingUndoRequest = true;
    addLog(`↩ ${requesterName} requested an undo`, 'event');
    const toast = document.getElementById('undo-request-toast');
    toast.innerHTML = `<div>\u21A9 <strong>${requesterName}</strong> wants to undo the last move. Allow it?</div>
      <div class="toast-btns">
        <button class="btn-grant" onclick="grantUndo()">\u2713 Grant Undo</button>
        <button class="btn-deny" onclick="denyUndo()">\u2717 Deny</button>
      </div>`;
    toast.classList.remove('show');
    void toast.offsetWidth;
    toast.classList.add('show');
  }

  function grantUndo() {
    _pendingUndoRequest = false;
    const toast = document.getElementById('undo-request-toast');
    toast.classList.remove('show');

    const undone = game.undo();
    if (!undone) return;
    lastMove = null;
    selected = null;
    validMoves = [];
    hintHighlight = null;
    document.getElementById('hint-panel').style.display = 'none';
    renderBoard();
    updateCaptures();
    renderTimers();
    updateStatus();
    updateHintBadges();

    const who = undone.color === 'w'
      ? document.getElementById('name-white').value
      : document.getElementById('name-black').value;
    addLog(`\u2713 Undo granted — ${who}'s move taken back`, 'event');
    showHintToast(`\u21A9 ${who}'s last move was undone!`);
  }

  function denyUndo() {
    _pendingUndoRequest = false;
    const toast = document.getElementById('undo-request-toast');
    toast.classList.remove('show');

    showHintToast('Undo request denied.');

  // ---- Hints ----
  function explainHint(piece, from, to, result, gameCopy, promo, PNAMES) {
    const name = piece ? PNAMES[piece.type] : 'Piece';
    const VALS = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };

    if (gameCopy.in_checkmate())
      return `Moving the ${name} to ${to} is checkmate — you WIN! 🏆 The opponent's King is completely trapped with nowhere to run and no way to escape. Game over!`;

    if (promo) {
      const pName = PNAMES[promo] || promo;
      const extra = gameCopy.in_check() ? 'and it puts the King in check right away!' : "making your army much more powerful!";
      return `Your Pawn walked all the way to the other side of the board and gets to turn into a ${pName}! 🌟 That's like getting a superpower — ${extra}`;
    }

    if (result && result.captured) {
      const capName = PNAMES[result.captured] || result.captured;
      const capVal = VALS[result.captured] || 1;
      const myVal  = piece ? (VALS[piece.type] || 1) : 1;
      if (gameCopy.in_check())
        return `The ${name} captures the opponent's ${capName} AND puts the King in check at the same time! ⚔️ Taking a piece and attacking the King in one move is an awesome combo!`;
      if (capVal > myVal)
        return `The ${name} captures the opponent's ${capName}, which is worth more points than your ${name}! 😄 Trading a less valuable piece for a more valuable one is like getting a great deal — you come out ahead!`;
      if (capVal === myVal)
        return `The ${name} captures the opponent's ${capName} for an even trade! ⚔️ Sometimes a fair trade is the right call — it removes a piece that was causing trouble.`;
      return `The ${name} captures the opponent's ${capName}! ⚔️ Taking away enemy pieces makes it easier to corner their King later on.`;
    }

    if (gameCopy.in_check())
      return `Moving the ${name} to ${to} puts the opponent's King in check! 👑 When the King is in check, the opponent MUST deal with it right away — they can't do anything else until it's safe.`;

    const centerSquares = ['d4','d5','e4','e5'];
    const nearCenter    = ['c3','c4','c5','c6','d3','d6','e3','e6','f3','f4','f5','f6'];
    if (centerSquares.includes(to))
      return `Moving the ${name} to the very center of the board is a smart strategy! 🎯 Pieces in the middle control more squares and can jump to attack anywhere super fast. Whoever owns the center usually wins!`;
    if (nearCenter.includes(to) && piece && (piece.type === 'n' || piece.type === 'b'))
      return `Bringing the ${name} toward the center puts it in a really active spot! 🚀 Knights and Bishops are most powerful when they're near the middle — from there they can reach almost the whole board.`;

    const backRanks = ['a1','b1','c1','d1','e1','f1','g1','h1','a8','b8','c8','d8','e8','f8','g8','h8'];
    if (backRanks.includes(from) && piece && piece.type !== 'k' && piece.type !== 'p')
      return `Bringing the ${name} into the game gets it off the back row and into the action! 🚀 The more pieces you have working together, the harder it is for your opponent to defend. Don't leave your team sitting on the bench!`;

    return `Moving the ${name} to ${to} improves your position step by step! ⭐ It controls important squares and makes life harder for the opponent. In chess, small advantages like this add up to a win!`;
  }

  function updateHintBadges() {
    const unlimited = hintLimit === 0;
    const wLeft = unlimited ? '∞' : Math.max(0, hintLimit - hintsUsedWhite);
    const bLeft = unlimited ? '∞' : Math.max(0, hintLimit - hintsUsedBlack);
    const wOut  = !unlimited && hintsUsedWhite >= hintLimit;
    const bOut  = !unlimited && hintsUsedBlack >= hintLimit;

    const wBadge = document.getElementById('hint-badge-white');
    const bBadge = document.getElementById('hint-badge-black');
    wBadge.textContent = wLeft;
    wBadge.className = 'hint-count' + (wOut ? ' out' : '');
    bBadge.textContent = bLeft;
    bBadge.className = 'hint-count' + (bOut ? ' out' : '');

    const isWhite = game.turn() === 'w';
    const used = isWhite ? hintsUsedWhite : hintsUsedBlack;
    document.getElementById('btn-hint').disabled =
      gameOver || (!unlimited && used >= hintLimit);
  }

  // ---- Stockfish Hint (runs in browser via Web Worker — no API key needed) ----
  const SF_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js';
  let _sfWorker = null, _sfReady = false;

  async function getStockfish() {
    if (_sfWorker && _sfReady) return _sfWorker;
    if (_sfWorker) { _sfWorker.terminate(); _sfWorker = null; _sfReady = false; }
    const code = await fetch(SF_CDN).then(r => r.text());
    _sfWorker = new Worker(URL.createObjectURL(new Blob([code], { type: 'application/javascript' })));
    await new Promise(res => {
      _sfWorker.onmessage = e => { if (e.data === 'uciok') res(); };
      _sfWorker.postMessage('uci');
    });
    await new Promise(res => {
      _sfWorker.onmessage = e => { if (e.data === 'readyok') res(); };
      _sfWorker.postMessage('isready');
    });
    _sfReady = true;
    return _sfWorker;
  }

  function askStockfish(fen, depth) {
    return getStockfish().then(sf => new Promise(res => {
      sf.onmessage = e => { if (e.data.startsWith('bestmove')) res(e.data.split(' ')[1] || null); };
      sf.postMessage('ucinewgame');
      sf.postMessage('position fen ' + fen);
      sf.postMessage('go depth ' + depth);
    }));
  }

  async function requestHint() {
    if (gameOver) return;
    const isWhite = game.turn() === 'w';
    const used = isWhite ? hintsUsedWhite : hintsUsedBlack;
    if (hintLimit !== 0 && used >= hintLimit) return;

    if (isWhite) hintsUsedWhite++; else hintsUsedBlack++;
    updateHintBadges();

    // Notify the opponent that a hint was used
    const playerName = isWhite
      ? document.getElementById('name-white').value
      : document.getElementById('name-black').value;
    addLog(`💡 ${playerName} used a hint`, 'event');
    const unlimited = hintLimit === 0;
    const remaining = unlimited ? '\u221E' : Math.max(0, hintLimit - (isWhite ? hintsUsedWhite : hintsUsedBlack));
    showHintToast(`\uD83D\uDCA1 ${playerName} used a hint! (${remaining} left)`);
    document.getElementById('hint-for-name').textContent = playerName;
    document.getElementById('hint-move-text').textContent = '...';
    document.getElementById('hint-explain').textContent = 'Stockfish is thinking... ♟';
    document.getElementById('hint-panel').style.display = 'block';
    document.getElementById('btn-hint').disabled = true;
    hintHighlight = null;
    renderBoard();

    try {
      const fen = game.fen();
      const bm = await askStockfish(fen, 15);
      if (!bm || bm === '(none)') throw new Error('No legal moves');
      const from = bm.slice(0, 2), to = bm.slice(2, 4), promo = bm.slice(4) || null;
      const PNAMES = { p: 'Pawn', n: 'Knight', b: 'Bishop', r: 'Rook', q: 'Queen', k: 'King' };
      const piece = game.get(from);
      const gameCopy = new Chess(fen);
      const result = gameCopy.move({ from, to, promotion: promo || 'q' });
      const moveSan = result ? result.san : from + '-' + to;
      document.getElementById('hint-move-text').textContent = moveSan;
      document.getElementById('hint-explain').textContent = explainHint(piece, from, to, result, gameCopy, promo, PNAMES);
      hintHighlight = { from, to };
      renderBoard();
    } catch (e) {
      document.getElementById('hint-move-text').textContent = '—';
      document.getElementById('hint-explain').textContent = '😕 Could not get hint: ' + e.message;
    } finally {
      updateHintBadges();
    }
  }

  // ---- Multiplayer ----
  function toggleMpPanel() {
    const p = document.getElementById('mp-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }

  function mpCreate() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    mpRoomId = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    mpColor = 'white';
    mpConnect();
  }

  function mpJoin() {
    const code = document.getElementById('mp-join-input').value.trim().toUpperCase();
    if (!code) return;
    mpRoomId = code;
    mpColor = 'black';
    mpConnect();
  }

  function mpConnect() {
    if (mpSocket) { try { mpSocket.close(); } catch(e) {} mpSocket = null; }
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/ws/${mpRoomId}/${mpColor}`;
    setMpStatus('Connecting...');
    mpSocket = new WebSocket(url);

    mpSocket.onopen = () => {
      document.getElementById('mp-code-display').textContent = mpRoomId;
      document.getElementById('mp-code-row').style.display = mpColor === 'white' ? 'flex' : 'none';
      // Lock opponent's name — only you edit your own
      const opColor = mpColor === 'white' ? 'black' : 'white';
      document.getElementById('name-' + opColor).disabled = true;
      saveMpSession();
      updateYouAreBanner();
    };

    mpSocket.onmessage = (evt) => {
      const d = JSON.parse(evt.data);

      if (d.type === 'init') {
        mpMode = true;
        // Reset game state without calling newGame() (which would disconnect)
        game = new Chess(); selected = null; validMoves = []; lastMove = null;
        gameOver = false; hintHighlight = null;
        clearInterval(timerInterval); timerInterval = null; timerRunning = false;
        totalSecsW = parseInt(document.getElementById('total-w').value);
        totalSecsB = parseInt(document.getElementById('total-b').value);
        incSecsW   = parseInt(document.getElementById('inc-w').value);
        incSecsB   = parseInt(document.getElementById('inc-b').value);
        timerEnabled = totalSecsW > 0 || totalSecsB > 0;
        timeWhite = totalSecsW; timeBlack = totalSecsB;
        hintLimit = parseInt(document.getElementById('hint-limit-select').value);
        hintsUsedWhite = 0; hintsUsedBlack = 0;
        readyWhite = false; readyBlack = false;
        updateReadyButtons();
        document.getElementById('btn-undo').disabled = true;
        document.getElementById('btn-surrender').disabled = false;
        document.getElementById('btn-pause').textContent = '⏸ Pause';
        document.getElementById('hint-panel').style.display = 'none';
        if (d.fen) { game.load(d.fen); if (d.last_move) lastMove = d.last_move; }
        renderBoard(); updateCaptures(); renderTimers(); updateStatus(); updateHintBadges(); updateBackground();
        const opp = d.opponent_online;
        setMpStatus(opp
          ? `✓ Opponent connected! You play ${mpColor}`
          : mpColor === 'white' ? `Waiting for opponent... share code: ${mpRoomId}` : 'Waiting for opponent to join...');

      } else if (d.type === 'opponent_joined') {
        setMpStatus(`✓ Opponent connected! You play ${mpColor}`);

      } else if (d.type === 'move') {
        const movingPiece = game.get(d.move.from);
        const r = game.move({ from: d.move.from, to: d.move.to, promotion: d.move.promotion || 'q' });
        if (r) {
          if (!gameStarted) { gameStarted = true; document.body.classList.add('game-started'); lockSettings(); updateExtraTimeButtons(); }
          playMoveSound(!!r.captured);
          if (r.captured && movingPiece) {
            const atkName = movingPiece.color === 'w'
              ? document.getElementById('name-white').value
              : document.getElementById('name-black').value;
            const vicName = movingPiece.color === 'w'
              ? document.getElementById('name-black').value
              : document.getElementById('name-white').value;
            showCaptureToast(vicName, PNAME_MAP[r.captured] || r.captured, atkName, PNAME_MAP[movingPiece.type] || movingPiece.type);
          }
          lastMove = { from: d.move.from, to: d.move.to };
          { const mName = r.color === 'w'
              ? document.getElementById('name-white').value
              : document.getElementById('name-black').value;
            let lm = `♟ ${mName}: ${r.san}`;
            if (r.captured) lm += ` ✕${PNAME_MAP[r.captured]||r.captured}`;
            addLog(lm, 'move'); }
          if (d.timeWhite !== undefined) timeWhite = d.timeWhite;
          if (d.timeBlack !== undefined) timeBlack = d.timeBlack;
          if (!timerRunning && !gameOver) startTimer();
          renderBoard(); updateCaptures(); renderTimers(); updateStatus(); updateHintBadges();
        }

      } else if (d.type === 'opponent_left') {
        setMpStatus('⚠ Opponent disconnected');

      } else if (d.type === 'error') {
        setMpStatus('Error: ' + d.msg);
      } else if (d.type === 'chat') {
        addChatMessage(d.color, d.name, d.msg);
      } else if (d.type === 'ready') {
        if (d.color === 'white') readyWhite = true;
        else readyBlack = true;
        updateReadyButtons();
        updateStatus();
      } else if (d.type === 'name') {
        document.getElementById('name-' + d.color).value = d.name;
      }
    };

    mpSocket.onclose = () => {
      if (mpMode) setMpStatus('Disconnected');
      mpMode = false;
      document.getElementById('name-white').disabled = false;
      document.getElementById('name-black').disabled = false;
      updateYouAreBanner();
    };
    mpSocket.onerror = () => setMpStatus('Connection error — is the server running?');
  }

  function setMpStatus(msg) {
    const el = document.getElementById('mp-status');
    if (el) el.textContent = msg;
  }

  // ---- Multiplayer session persistence (localStorage) ----
  const MP_SESSION_KEY = 'chess_mp_session';

  function saveMpSession() {
    localStorage.setItem(MP_SESSION_KEY, JSON.stringify({
      roomId: mpRoomId,
      color: mpColor,
      nameWhite: document.getElementById('name-white').value,
      nameBlack: document.getElementById('name-black').value,
    }));
  }

  function clearMpSession() {
    localStorage.removeItem(MP_SESSION_KEY);
  }

  function checkRejoinSession() {
    try {
      const raw = localStorage.getItem(MP_SESSION_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);
      if (!s.roomId || !s.color) { clearMpSession(); return; }
      window._rejoinSession = s;
      document.getElementById('rejoin-code').textContent = s.roomId;
      document.getElementById('rejoin-color-text').textContent =
        s.color === 'white' ? '♔ WHITE' : '♚ BLACK';
      document.getElementById('rejoin-banner').style.display = 'flex';
    } catch(e) { clearMpSession(); }
  }

  function rejoinGame() {
    const s = window._rejoinSession;
    if (!s) return;
    document.getElementById('rejoin-banner').style.display = 'none';
    if (s.nameWhite) document.getElementById('name-white').value = s.nameWhite;
    if (s.nameBlack) document.getElementById('name-black').value = s.nameBlack;
    document.getElementById('mp-panel').style.display = 'block';
    mpRoomId = s.roomId;
    mpColor = s.color;
    mpConnect();
  }

  function dismissRejoin() {
    clearMpSession();
    window._rejoinSession = null;
    document.getElementById('rejoin-banner').style.display = 'none';
  }

  // ---- You are playing as indicator ----
  function updateYouAreBanner() {
    const banner = document.getElementById('you-are-banner');
    document.getElementById('you-badge-white').style.display = 'none';
    document.getElementById('you-badge-black').style.display = 'none';
    if (!mpMode || !mpColor) {
      banner.style.display = 'none';
      return;
    }
    const isWhite = mpColor === 'white';
    banner.style.display = 'block';
    banner.className = 'you-are-banner ' + mpColor;
    banner.textContent = isWhite ? '♔ You are playing as WHITE' : '♚ You are playing as BLACK';
    document.getElementById('you-badge-' + mpColor).style.display = 'inline';
  }

  // ---- Audio ----
  let _actx = null;
  function getACtx() {
    if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
    if (_actx.state === 'suspended') _actx.resume();
    return _actx;
  }
  function playMoveSound(isCapture) {
    try {
      const c = getACtx(), t = c.currentTime;
      const dur = isCapture ? 0.13 : 0.09;
      const freq = isCapture ? 650 : 1100;
      const vol  = isCapture ? 0.55 : 0.4;
      const buf = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(); src.buffer = buf;
      const filt = c.createBiquadFilter(); filt.type = 'bandpass';
      filt.frequency.value = freq; filt.Q.value = isCapture ? 0.7 : 1.2;
      const gain = c.createGain();
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(filt); filt.connect(gain); gain.connect(c.destination);
      src.start(t); src.stop(t + dur);
      if (isCapture) {
        const buf2 = c.createBuffer(1, Math.floor(c.sampleRate * 0.07), c.sampleRate);
        const d2 = buf2.getChannelData(0);
        for (let i = 0; i < d2.length; i++) d2[i] = Math.random() * 2 - 1;
        const src2 = c.createBufferSource(); src2.buffer = buf2;
        const filt2 = c.createBiquadFilter(); filt2.type = 'bandpass';
        filt2.frequency.value = 380; filt2.Q.value = 0.5;
        const gain2 = c.createGain();
        gain2.gain.setValueAtTime(0.35, t + 0.06);
        gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
        src2.connect(filt2); filt2.connect(gain2); gain2.connect(c.destination);
        src2.start(t + 0.06); src2.stop(t + 0.13);
      }
    } catch(e) {}
  }
  function playCheckSound() {
    try {
      const c = getACtx(), t = c.currentTime;
      [523, 784].forEach((freq, i) => {
        const osc = c.createOscillator(), gain = c.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        const dl = i * 0.14;
        gain.gain.setValueAtTime(0.22, t + dl);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dl + 0.18);
        osc.connect(gain); gain.connect(c.destination);
        osc.start(t + dl); osc.stop(t + dl + 0.18);
      });
    } catch(e) {}
  }
  function playGameOverSound() {
    try {
      const c = getACtx(), t = c.currentTime;
      [523, 415, 311].forEach((freq, i) => {
        const osc = c.createOscillator(), gain = c.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        const dl = i * 0.22;
        gain.gain.setValueAtTime(0.28, t + dl);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dl + 0.3);
        osc.connect(gain); gain.connect(c.destination);
        osc.start(t + dl); osc.stop(t + dl + 0.3);
      });
    } catch(e) {}
  }

  // ---- Square size (computed in JS for cross-browser reliability) ----
  function updateSqSize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    let sz;
    if (w <= 599) {
      // Mobile: single column — fill width minus body padding (8×2) and rank labels+gap (24)
      sz = Math.floor((w - 16 - 24) / 8);
      sz = Math.min(Math.max(sz, 36), 62);
    } else if (w <= 1100) {
      // Tablet: horizontal layout — subtract body padding (20×2), two player panels (155×2),
      // gaps between board and panels (24×2), then rank labels+gap (24)
      const available = w - 40 - 310 - 48;
      sz = Math.floor((available - 24) / 8);
      sz = Math.min(Math.max(sz, 36), 90);
    } else {
      const vmin = Math.min(w, h);
      sz = Math.min(110, Math.max(44, Math.floor((vmin - 220) / 8)));
    }
    document.documentElement.style.setProperty('--sq-size', sz + 'px');
  }
  updateSqSize();
  window.addEventListener('resize', function() { updateSqSize(); renderBoard(); });

  // ---- Boot ----
  if (location.protocol === 'file:') {
    const btn = document.getElementById('btn-mp');
    btn.disabled = true;
    btn.title = 'Multiplayer requires the server (not available as a local file)';
  }
  newGame();
  checkRejoinSession();
</script>
